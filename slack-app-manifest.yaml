display_information:
  name: VIP Connect Bot
  description: Event notifications for Moloco VIP Connect dinners
  background_color: "#040078"
  long_description: |
    Posts real-time notifications to #vip-connect-events when guests
    register for or check in to VIP Connect events. Also provides
    daily registration summaries.

features:
  bot_user:
    display_name: VIP Connect Bot
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - incoming-webhook

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
